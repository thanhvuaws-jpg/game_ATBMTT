<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBER SHIELD: Đội Phản Ứng Số</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/skills.css">
  <link rel="stylesheet" href="css/multiplayer.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2 L28 7 L28 17 C28 23 22 28 16 30 C10 28 4 23 4 17 L4 7 Z' fill='%230E1424' stroke='%23E8A33D' stroke-width='2'/%3E%3Cpath d='M12 16 L15 19 L21 13' stroke='%233FA796' stroke-width='2.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
</head>
<body>

<div id="app">

  <!-- ─── HEADER ─────────────────────────────────────────────────────────── -->
  <header id="header">
    <div id="header-brand">CYBER SHIELD</div>
    <div id="header-player">Chuyên viên: <span id="header-charname">Long</span></div>
    <div id="header-case">#---</div>
    <div class="header-spacer"></div>
    <div id="trust-container">
      <span id="trust-label">CHỈ SỐ TÍN NHIỆM</span>
      <div id="trust-bar-wrap">
        <div id="trust-bar"></div>
      </div>
      <span id="trust-value">60</span>
    </div>
    <div id="tp-display" title="Điểm Đào Tạo">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;">
        <polygon points="8,1 10,6 15,6 11,10 13,15 8,12 3,15 5,10 1,6 6,6"
                 fill="none" stroke="#E8A33D" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <span id="tp-value">0</span>
      <span class="tp-unit">TP</span>
    </div>
    <button id="btn-pause" title="Trung Tâm Đào Tạo">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="4" height="12" rx="1" fill="currentColor"/>
        <rect x="10" y="2" width="4" height="12" rx="1" fill="currentColor"/>
      </svg>
    </button>
    <button id="btn-exit-mission" title="Thoát nhiệm vụ" class="hidden" style="background:none; border:1px solid rgba(214,69,80,0.5); background:rgba(214,69,80,0.1); color:var(--danger); font-family:var(--font-mono); font-size:10px; padding:6px 12px; border-radius:var(--radius); font-weight:bold; cursor:pointer;">
      THOÁT MÀN
    </button>
    <div class="bgm-control-wrap">
      <button id="btn-bgm-toggle" title="Tắt Nhạc nền">🎵</button>
      <input type="range" id="slider-bgm-volume" min="0" max="100" value="40" title="Âm lượng nhạc nền">
    </div>
    <button id="btn-mute" title="Bật/tắt âm thanh">🔊</button>
  </header>

  <!-- ─── COMBAT HP BARS ────────────────────────────────────────────────── -->
  <div id="combat-hp-bar" class="hidden">
    <!-- Projectile FX layer -->
    <div id="combat-fx-layer"></div>

    <!-- Player HP (left) -->
    <div class="hp-side" id="player-hp-side">
      <div class="hp-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 2 L24 6 L24 14 C24 20 19 25 14 27 C9 25 4 20 4 14 L4 6 Z"
                fill="#1B2438" stroke="#3FA796" stroke-width="1.5"/>
          <path d="M10 14 L13 17 L19 11" stroke="#3FA796" stroke-width="2"
                fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="hp-info">
        <div class="hp-name">KHIÊN HỆ THỐNG — VinaTech</div>
        <div class="hp-bar-wrap">
          <div class="hp-fill" id="player-hp-fill" style="width:100%"></div>
        </div>
        <div class="hp-val" id="player-hp-val">100/100</div>
      </div>
    </div>

    <div id="hp-vs" style="display:none;">VS</div>

    <!-- Boss HP (right) — ẩn ở Ch3, hiện ở Ch5 -->
    <div class="hp-side hp-side-boss" id="boss-hp-side" style="display:none">
      <div class="hp-info" style="align-items:flex-end">
        <div class="hp-name">MẠNG LƯỚI GHOST_VN</div>
        <div class="hp-bar-wrap">
          <div class="hp-fill" id="boss-hp-fill" style="width:100%"></div>
        </div>
        <div class="hp-val" id="boss-hp-val">100/100</div>
        <!-- Shield bar -->
        <div id="boss-shield-wrap" style="display:none;align-items:center;gap:6px;flex-direction:row-reverse;">
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--accent);">KHIÊN</span>
          <div class="hp-bar-wrap" style="width:80px;height:5px;">
            <div class="hp-fill" id="shield-fill" style="width:100%;background:#E8A33D"></div>
          </div>
        </div>
      </div>
      <!-- Boss icon with shield ring -->
      <div class="hp-icon" style="position:relative;">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="10" r="6" fill="#1B2438" stroke="#D64550" stroke-width="1.5"/>
          <path d="M8 15 L8 24 L10.5 22 L14 24 L17.5 22 L20 24 L20 15"
                fill="#1B2438" stroke="#D64550" stroke-width="1.5"/>
          <circle cx="11" cy="9"  r="1.5" fill="#D64550"/>
          <circle cx="17" cy="9"  r="1.5" fill="#D64550"/>
          <line x1="14" y1="5" x2="14" y2="3" stroke="#D64550" stroke-width="1.2"/>
          <line x1="19" y1="7" x2="21" y2="6" stroke="#D64550" stroke-width="1.2"/>
          <line x1="9"  y1="7" x2="7"  y2="6" stroke="#D64550" stroke-width="1.2"/>
        </svg>
        <div id="boss-shield-ring" class="boss-shield-ring" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- ─── MAIN ───────────────────────────────────────────────────────────── -->
  <main id="main">
    <div id="main-loader" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; font-family:var(--font-mono); color:var(--accent);">
      <div style="font-size:18px; margin-bottom:10px; font-weight:bold; letter-spacing:0.1em;">ĐANG TẢI DỮ LIỆU...</div>
      <div style="font-size:12px; color:var(--text-muted);">Hệ thống đang thiết lập các màn chơi an ninh mạng</div>
    </div>
  </main>
</div>

<!-- Scoreboard nổi khi đang chơi MP -->
<div id="mp-scoreboard" class="mp-scoreboard hidden">
  <div class="mp-sb-header">
    <div class="mp-sb-title">BẢNG XẾP HẠNG</div>
    <div id="mp-sb-room" class="mp-sb-room"></div>
  </div>
  <div id="mp-sb-list"></div>
  <div id="mp-sb-action" style="padding: 8px 12px; border-top: 1px solid var(--border);">
    <button id="btn-mp-quit" class="btn-ghost" style="width: 100%; font-size: 10px; padding: 6px 12px; color: var(--danger); border-color: rgba(214,69,80,0.3); background: rgba(214,69,80,0.05);"></button>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- RESPONSIVE WARNING -->
<div id="resize-warning">Mở rộng cửa sổ trình duyệt để trải nghiệm tốt nhất (khuyến nghị 1024px+)</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/bgm.js"></script>
<script src="js/combat.js"></script>
<script src="js/skills.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/multiplayer.js"></script>
<script src="js/auth.js"></script>
<script src="js/game.js"></script>
</body>
</html>
